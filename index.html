<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <meta name="theme-color" content="#0b2b4f">
    <title>📊 财经新闻 · 云端快讯</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f4f8;
            color: #1e293b;
            line-height: 1.5;
            padding: 16px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(145deg, #0b2b4f, #163a5e);
            color: white;
            padding: 28px 24px;
            border-radius: 28px;
            margin-bottom: 24px;
            box-shadow: 0 12px 24px rgba(0,20,40,0.15);
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 span {
            font-size: 2.2rem;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.12);
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 0.95rem;
        }

        /* 时间范围选择器 */
        .time-range {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .time-btn {
            background: white;
            border: 1px solid #d0dae8;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #2a4d6e;
        }

        .time-btn:hover {
            background: #e3ecf5;
        }

        .time-btn.active {
            background: #2a6f97;
            color: white;
            border-color: #2a6f97;
        }

        /* 搜索栏 */
        .search-bar {
            background: white;
            border-radius: 50px;
            padding: 8px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 0.95rem;
            padding: 8px 0;
            background: transparent;
        }

        .search-bar button {
            background: #2a6f97;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-bar button:hover {
            background: #1e4a6b;
        }

        .search-clear {
            margin-left: 8px;
            color: #6b7a8f;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .news-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .news-card {
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            border-left: 4px solid #2a6f97;
            transition: all 0.2s ease;
        }

        .news-card:hover {
            box-shadow: 0 8px 18px rgba(0,40,80,0.08);
            transform: translateY(-2px);
        }

        .news-title {
            font-size: 1rem;
            font-weight: 500;
            color: #0a1c2c;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .sources-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }

        .source-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 12px;
            border-radius: 30px;
            background: #f0f4fa;
            color: #2a6f97;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .source-icon:hover {
            background: #2a6f97;
            color: white;
            border-color: #2a6f97;
            transform: scale(1.02);
        }

        .source-icon .emoji {
            margin-right: 4px;
            font-size: 1rem;
        }

        .news-time {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #6b7a8f;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #e9ecf2;
        }

        .news-time .time-icon {
            font-size: 0.9rem;
        }

        /* 标签样式 */
        .news-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px dashed #e0e7ef;
        }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 400;
            background: #f2f6fc;
            color: #2a4d6e;
            border: 1px solid #d9e2ef;
        }

        .tag-concept {
            background: #e3f0ff;
            border-color: #b8d3f0;
            color: #1a5a9c;
        }

        .tag-industry {
            background: #ecf7ef;
            border-color: #b8e0c9;
            color: #1e6f3c;
        }

        /* 加载更多按钮 */
        .load-more {
            background: white;
            border: 1px solid #d0dae8;
            border-radius: 40px;
            padding: 14px;
            margin: 20px 0;
            text-align: center;
            color: #2a6f97;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .load-more:hover {
            background: #2a6f97;
            color: white;
            border-color: #2a6f97;
        }

        .load-more.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .loading, .error, .empty {
            background: white;
            border-radius: 24px;
            padding: 48px 24px;
            text-align: center;
            color: #5a6e7e;
            box-shadow: 0 6px 14px rgba(0,0,0,0.02);
        }

        .loading span {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 16px;
        }

        .error span {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 16px;
        }

        .retry-btn {
            background: #1e4a6b;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            margin-top: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .retry-btn:hover {
            background: #0f3a52;
        }

        .footer {
            text-align: center;
            margin-top: 48px;
            color: #62748c;
            font-size: 0.78rem;
            border-top: 1px solid #dce5ec;
            padding-top: 28px;
        }

        .update-badge {
            background: #1e4a6b;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            display: inline-block;
            margin-bottom: 16px;
        }

        /* 移动端优化 */
        @media (max-width: 480px) {
            .news-card {
                padding: 14px 16px;
            }
            .news-title {
                font-size: 0.95rem;
            }
            .source-icon {
                padding: 4px 10px;
                font-size: 0.8rem;
            }
            .news-time {
                font-size: 0.75rem;
            }
            .tag {
                padding: 2px 8px;
                font-size: 0.7rem;
            }
            .time-btn {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span>📊</span> 财经新闻·云端快讯
            </h1>
            <div class="stats">
                <span>⏱ 最后更新: <span id="update-time">--:--</span></span>
                <span>📰 当前显示: <span id="news-count">0</span> 条</span>
            </div>
        </div>

        <!-- 时间范围选择器 -->
        <div class="time-range">
            <button class="time-btn active" data-range="24h">最近24小时</button>
            <button class="time-btn" data-range="48h">最近48小时</button>
            <button class="time-btn" data-range="7d">最近7天</button>
            <button class="time-btn" data-range="30d">最近30天</button>
        </div>

        <!-- 搜索栏 -->
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="搜索新闻标题..." value="">
            <button id="search-btn">搜索</button>
            <span class="search-clear" id="clear-search" style="display: none;">✕</span>
        </div>

        <div id="news-list" class="news-list">
            <div class="loading">
                <span>📡</span>
                正在加载新闻...
            </div>
        </div>

        <div class="footer">
            <span class="update-badge">⚡ 每30分钟自动更新</span>
            <p style="margin-top: 20px;">
                📌 点击来源图标查看原文 · 支持历史检索<br>
                🚀 基于 GitHub Actions + Cloudflare Pages
            </p>
        </div>
    </div>

    <script>
        // ==================== 全局变量 ====================
        let allNews = [];              // 所有已加载的新闻（合并后）
        let displayedNews = [];        // 当前显示的新闻
        let currentTimeRange = '24h';  // 当前时间范围
        let currentSearchTerm = '';    // 当前搜索词
        let loadedDates = new Set();   // 已加载的日期
        let loadedMonths = new Set();  // 已加载的月份

        // ==================== 来源图标配置 ====================
        const SOURCE_CONFIG = {
            '东方财富': { emoji: '📈', name: '东方财富' },
            '东方财富快讯': { emoji: '📈', name: '东方财富' },
            '财联社': { emoji: '📡', name: '财联社' },
            '新浪财经': { emoji: '🐦', name: '新浪财经' },
            '华尔街见闻': { emoji: '📰', name: '华尔街见闻' },
            '证券时报': { emoji: '📊', name: '证券时报' },
            '第一财经': { emoji: '📺', name: '第一财经' },
            '默认': { emoji: '🔗', name: '原文' }
        };

        // ==================== 工具函数 ====================

        // 获取来源配置
        function getSourceConfig(source) {
            if (!source) return SOURCE_CONFIG['默认'];
            return SOURCE_CONFIG[source] || SOURCE_CONFIG['默认'];
        }

        // 获取正确链接
        function getNewsUrl(item) {
            if (item.code) {
                return `https://finance.eastmoney.com/a/${item.code}.html`;
            }
            return 'https://finance.eastmoney.com/';
        }

        // 格式化时间显示
        function formatNewsTime(timeStr) {
            if (!timeStr) return '未知时间';
            // 如果已经是 "MM-DD HH:MM" 格式，直接返回
            if (/^\d{2}-\d{2} \d{2}:\d{2}$/.test(timeStr)) {
                return timeStr;
            }
            // 如果是 "YYYY-MM-DD HH:MM:SS" 格式，提取 "MM-DD HH:MM"
            const match = timeStr.match(/(\d{4}-\d{2}-\d{2}) (\d{2}:\d{2})/);
            if (match) {
                return `${match[1].slice(5)} ${match[2]}`;
            }
            return timeStr;
        }

        // 获取新闻时间（完整格式）
        function getFullNewsTime(item) {
            const fields = ['showTime', 'time', 'publish_time', 'pubDate'];
            for (const field of fields) {
                if (item[field]) return item[field];
                if (item.raw_data?.[field]) return item.raw_data[field];
            }
            return null;
        }

        // 渲染标签
        function renderTags(tags) {
            if (!tags) return '';

            let html = '';

            if (tags.concepts && tags.concepts.length > 0) {
                tags.concepts.forEach(concept => {
                    const matched = concept.matched_keyword ? ` (${concept.matched_keyword})` : '';
                    html += `<span class="tag tag-concept" title="概念: ${concept.name}${matched}">🏷️ ${concept.name}</span>`;
                });
            }

            if (tags.industries && tags.industries.length > 0) {
                tags.industries.forEach(industry => {
                    const levelInfo = `行业: ${industry.level1 || ''} > ${industry.level2 || ''} > ${industry.name}`;
                    html += `<span class="tag tag-industry" title="${levelInfo}">🏭 ${industry.name}</span>`;
                });
            }

            return html;
        }

        // ==================== 合并新闻（按标题智能去重）- 优化版 ====================
        function mergeNews(newsList) {
            const newsMap = new Map();

            newsList.forEach(item => {
                // 生成一个更灵活的唯一键（去除常见前缀）
                let rawTitle = item.title || '无标题';
                // 移除常见的新闻来源前缀
                let cleanTitle = rawTitle
                    .replace(/^(【.*?】)?(财联社.*?日电\s*)?/g, '')
                    .replace(/^\s*|\s*$/g, '');
                if (!cleanTitle) cleanTitle = rawTitle;

                const key = cleanTitle; // 使用清理后的标题作为合并键

                const sourceName = item.source || '默认';
                const url = getNewsUrl(item);
                const time = getFullNewsTime(item) || '未知时间';
                const displayTime = formatNewsTime(time);

                if (!newsMap.has(key)) {
                    newsMap.set(key, {
                        title: rawTitle,
                        cleanTitle: cleanTitle,
                        time: time,
                        displayTime: displayTime,
                        tags: item.tags || { industries: [], concepts: [] },
                        sources: [{
                            name: sourceName,
                            url: url,
                            config: getSourceConfig(sourceName)
                        }]
                    });
                } else {
                    const existing = newsMap.get(key);
                    if (!existing.sources.some(s => s.name === sourceName)) {
                        existing.sources.push({
                            name: sourceName,
                            url: url,
                            config: getSourceConfig(sourceName)
                        });
                    }
                    // 保留最新的时间
                    if (time !== '未知时间' && (existing.time === '未知时间' || time > existing.time)) {
                        existing.time = time;
                        existing.displayTime = displayTime;
                    }
                }
            });

            return Array.from(newsMap.values());
        }

        // 按时间排序
        function sortByTime(newsArray) {
            return newsArray.sort((a, b) => {
                if (a.time === '未知时间' && b.time === '未知时间') return 0;
                if (a.time === '未知时间') return 1;
                if (b.time === '未知时间') return -1;
                return b.time.localeCompare(a.time);
            });
        }

        // 过滤新闻（根据搜索词）
        function filterNews(newsArray, searchTerm) {
            if (!searchTerm) return newsArray;
            const term = searchTerm.toLowerCase();
            return newsArray.filter(item =>
                item.title.toLowerCase().includes(term)
            );
        }

        // 根据时间范围过滤
        function filterByTimeRange(newsArray, range) {
            const now = new Date();
            let cutoffTime = new Date();

            switch(range) {
                case '24h':
                    cutoffTime = new Date(now - 24 * 60 * 60 * 1000);
                    break;
                case '48h':
                    cutoffTime = new Date(now - 48 * 60 * 60 * 1000);
                    break;
                case '7d':
                    cutoffTime = new Date(now - 7 * 24 * 60 * 60 * 1000);
                    break;
                case '30d':
                    cutoffTime = new Date(now - 30 * 24 * 60 * 60 * 1000);
                    break;
                default:
                    return newsArray;
            }

            return newsArray.filter(item => {
                if (item.time === '未知时间') return false;
                const itemDate = new Date(item.time);
                return itemDate >= cutoffTime;
            });
        }

        // 加载某一天的数据
        async function loadDateData(dateStr) {
            if (loadedDates.has(dateStr)) return null;

            try {
                const response = await fetch(`/data/archive/${dateStr}.json?t=${Date.now()}`);
                if (!response.ok) return null;

                const data = await response.json();
                loadedDates.add(dateStr);
                return data;
            } catch (e) {
                console.error(`加载 ${dateStr} 失败:`, e);
                return null;
            }
        }

        // 加载某个月的数据
        async function loadMonthData(monthStr) {
            if (loadedMonths.has(monthStr)) return null;

            try {
                const response = await fetch(`/data/archive/merged/${monthStr}.json?t=${Date.now()}`);
                if (!response.ok) return null;

                const data = await response.json();
                loadedMonths.add(monthStr);
                return data;
            } catch (e) {
                console.error(`加载 ${monthStr} 月数据失败:`, e);
                return null;
            }
        }

        // ==================== 修复版：加载今日数据 ====================
        async function loadToday() {
            try {
                // 强制加上时间戳，确保每次请求都是最新的，不被缓存
                const timestamp = Date.now();
                const [newsRes, timeRes] = await Promise.all([
                    fetch('/data/today.json?t=' + timestamp),
                    fetch('/data/last_update.txt?t=' + timestamp)
                ]);

                if (!newsRes.ok) {
                    throw new Error(`今日数据加载失败 (HTTP ${newsRes.status})`);
                }
                if (!timeRes.ok) {
                    throw new Error(`时间戳加载失败 (HTTP ${timeRes.status})`);
                }

                const news = await newsRes.json();
                const updateTime = await timeRes.text();

                // 设置今天日期
                const today = new Date().toISOString().split('T')[0];
                loadedDates.add(today);

                // 合并并排序
                allNews = sortByTime(mergeNews(news));

                // 更新时间戳
                const timeStr = updateTime.trim().slice(5, 16) || updateTime.trim();
                document.getElementById('update-time').textContent = timeStr;

                // 应用当前过滤
                applyFilters();

                console.log(`✅ 数据加载成功: ${news.length} 条原始新闻, ${allNews.length} 条合并后`);

            } catch (error) {
                console.error('❌ 加载今日数据失败:', error);
                // 显示错误信息到页面
                document.getElementById('news-list').innerHTML = `
                    <div class="error">
                        <span>⚠️</span>
                        <h3>加载失败</h3>
                        <p>${error.message}</p>
                        <button onclick="location.reload()" class="retry-btn">重试</button>
                    </div>
                `;
                // 增加重试机制，延迟2秒后重试
                setTimeout(() => loadToday(), 2000);
            }
        }

        // 渲染新闻列表
        function renderNews(newsArray) {
            const container = document.getElementById('news-list');
            if (!newsArray || newsArray.length === 0) {
                container.innerHTML = '<div class="empty"><span>📭</span><h3>暂无新闻</h3></div>';
                document.getElementById('news-count').textContent = '0';
                return;
            }

            let html = '';
            newsArray.forEach(item => {
                let sourcesHtml = '';
                item.sources.forEach(source => {
                    sourcesHtml += `
                        <a href="${escapeHtml(source.url)}" target="_blank" class="source-icon" title="查看${source.name}原文">
                            <span class="emoji">${source.config.emoji}</span> ${source.config.name}
                        </a>
                    `;
                });

                const tagsHtml = renderTags(item.tags);

                html += `
                    <div class="news-card">
                        <div class="news-title">${escapeHtml(item.title)}</div>
                        <div class="sources-bar">${sourcesHtml}</div>
                        <div class="news-time">
                            <span class="time-icon">🕐</span>
                            <span>${item.displayTime}</span>
                        </div>
                        ${tagsHtml ? `<div class="news-tags">${tagsHtml}</div>` : ''}
                    </div>
                `;
            });

            container.innerHTML = html;
            document.getElementById('news-count').textContent = newsArray.length;
        }

        // 应用所有过滤条件
        function applyFilters() {
            let filtered = filterByTimeRange(allNews, currentTimeRange);
            filtered = filterNews(filtered, currentSearchTerm);
            renderNews(filtered);
        }

        // 改变时间范围
        function setTimeRange(range) {
            currentTimeRange = range;

            // 更新按钮状态
            document.querySelectorAll('.time-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.range === range) {
                    btn.classList.add('active');
                }
            });

            applyFilters();
        }

        // 搜索处理
        function handleSearch() {
            const searchInput = document.getElementById('search-input');
            const term = searchInput.value.trim();
            currentSearchTerm = term;

            document.getElementById('clear-search').style.display = term ? 'inline' : 'none';
            applyFilters();
        }

        // 清除搜索
        function clearSearch() {
            document.getElementById('search-input').value = '';
            currentSearchTerm = '';
            document.getElementById('clear-search').style.display = 'none';
            applyFilters();
        }

        // HTML转义
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return String(unsafe)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            loadToday();

            // 绑定时间范围按钮
            document.querySelectorAll('.time-btn').forEach(btn => {
                btn.addEventListener('click', () => setTimeRange(btn.dataset.range));
            });

            // 绑定搜索事件
            document.getElementById('search-btn').addEventListener('click', handleSearch);
            document.getElementById('clear-search').addEventListener('click', clearSearch);
            document.getElementById('search-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleSearch();
            });

            // 每60秒刷新今日数据
            setInterval(() => {
                console.log('🔄 定时刷新数据...');
                if (!currentSearchTerm) {
                    loadToday();
                }
            }, 60000);
        });
    </script>
</body>
</html>
