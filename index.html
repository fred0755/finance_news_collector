<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <meta name="theme-color" content="#0b2b4f">
    <title>📊 财经新闻 · 云端快讯</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f4f8;
            color: #1e293b;
            line-height: 1.5;
            padding: 16px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(145deg, #0b2b4f, #163a5e);
            color: white;
            padding: 28px 24px;
            border-radius: 28px;
            margin-bottom: 24px;
            box-shadow: 0 12px 24px rgba(0,20,40,0.15);
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 span {
            font-size: 2.2rem;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.12);
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 0.95rem;
        }

        /* 时间范围选择器 */
        .time-range {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .time-btn {
            background: white;
            border: 1px solid #d0dae8;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #2a4d6e;
        }

        .time-btn:hover {
            background: #e3ecf5;
        }

        .time-btn.active {
            background: #2a6f97;
            color: white;
            border-color: #2a6f97;
        }

        /* 搜索栏 */
        .search-bar {
            background: white;
            border-radius: 50px;
            padding: 8px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 0.95rem;
            padding: 8px 0;
            background: transparent;
        }

        .search-bar button {
            background: #2a6f97;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-bar button:hover {
            background: #1e4a6b;
        }

        .search-clear {
            margin-left: 8px;
            color: #6b7a8f;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .news-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .news-card {
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            border-left: 4px solid #2a6f97;
            transition: all 0.2s ease;
        }

        .news-card:hover {
            box-shadow: 0 8px 18px rgba(0,40,80,0.08);
            transform: translateY(-2px);
        }

        .news-title {
            font-size: 1rem;
            font-weight: 500;
            color: #0a1c2c;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .sources-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }

        .source-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 12px;
            border-radius: 30px;
            background: #f0f4fa;
            color: #2a6f97;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .source-icon:hover {
            background: #2a6f97;
            color: white;
            border-color: #2a6f97;
            transform: scale(1.02);
        }

        .source-icon .emoji {
            margin-right: 4px;
            font-size: 1rem;
        }

        .news-time {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #6b7a8f;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #e9ecf2;
        }

        .news-time .time-icon {
            font-size: 0.9rem;
        }

        /* 标签样式 */
        .news-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px dashed #e0e7ef;
        }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 400;
            background: #f2f6fc;
            color: #2a4d6e;
            border: 1px solid #d9e2ef;
        }

        .tag-concept {
            background: #e3f0ff;
            border-color: #b8d3f0;
            color: #1a5a9c;
        }

        .tag-industry {
            background: #ecf7ef;
            border-color: #b8e0c9;
            color: #1e6f3c;
        }

        /* 详情区域样式 */
        .news-detail {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #2e405b;
            background: #f8fafd;
            border-radius: 12px;
            padding: 12px;
            margin-top: 12px;
            border-left: 3px solid #2a6f97;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .toggle-detail-btn {
            background: white;
            border: 1px solid #d0dae8;
            border-radius: 20px;
            padding: 6px 14px;
            margin-top: 8px;
            color: #2a6f97;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }

        .toggle-detail-btn:hover {
            background: #e3ecf5;
            border-color: #2a6f97;
        }

        /* 加载状态 */
        .load-more {
            background: white;
            border: 1px solid #d0dae8;
            border-radius: 40px;
            padding: 14px;
            margin: 20px 0;
            text-align: center;
            color: #2a6f97;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .load-more:hover {
            background: #2a6f97;
            color: white;
            border-color: #2a6f97;
        }

        .load-more.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .loading, .error, .empty {
            background: white;
            border-radius: 24px;
            padding: 48px 24px;
            text-align: center;
            color: #5a6e7e;
            box-shadow: 0 6px 14px rgba(0,0,0,0.02);
        }

        .loading span {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 16px;
        }

        .error span {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 16px;
        }

        .retry-btn {
            background: #1e4a6b;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            margin-top: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .retry-btn:hover {
            background: #0f3a52;
        }

        .footer {
            text-align: center;
            margin-top: 48px;
            color: #62748c;
            font-size: 0.78rem;
            border-top: 1px solid #dce5ec;
            padding-top: 28px;
        }

        .update-badge {
            background: #1e4a6b;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            display: inline-block;
            margin-bottom: 16px;
        }

        /* 移动端优化 */
        @media (max-width: 480px) {
            .news-card {
                padding: 14px 16px;
            }
            .news-title {
                font-size: 0.95rem;
            }
            .source-icon {
                padding: 4px 10px;
                font-size: 0.8rem;
            }
            .news-time {
                font-size: 0.75rem;
            }
            .tag {
                padding: 2px 8px;
                font-size: 0.7rem;
            }
            .time-btn {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            .news-detail {
                font-size: 0.85rem;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span>📊</span> 财经新闻·云端快讯
            </h1>
            <div class="stats">
                <span>⏱ 最后更新: <span id="update-time">--:--</span></span>
                <span>📰 当前显示: <span id="news-count">0</span> 条</span>
            </div>
        </div>

        <!-- 时间范围选择器 -->
        <div class="time-range">
            <button class="time-btn active" data-range="12h">最近12小时</button>
            <button class="time-btn" data-range="24h">最近24小时</button>
            <button class="time-btn" data-range="7d">最近7天</button>
        </div>

        <!-- 搜索栏 -->
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="搜索新闻标题..." value="">
            <button id="search-btn">搜索</button>
            <span class="search-clear" id="clear-search" style="display: none;">✕</span>
        </div>

        <div id="news-list" class="news-list">
            <div class="loading">
                <span>📡</span>
                正在加载新闻...
            </div>
        </div>

        <!-- 加载历史数据的提示（动态显示） -->
        <div id="load-more-btn" class="load-more" style="display: none;">
            📅 正在加载历史数据...
        </div>

        <div class="footer">
            <span class="update-badge">⚡ 每30分钟自动更新</span>
            <p style="margin-top: 20px;">
                📌 点击来源图标查看原文 · 支持历史检索<br>
                🚀 基于 GitHub Actions + Cloudflare Pages
            </p>
        </div>
    </div>

    <script>
        // ==================== 全局变量 ====================
        let allNews = [];              // 所有已加载的新闻（合并后）
        let displayedNews = [];        // 当前显示的新闻
        let currentTimeRange = '12h';  // 当前时间范围
        let currentSearchTerm = '';    // 当前搜索词
        let loadedDates = new Set();   // 已加载的日期
        let isLoading = false;         // 防止重复加载

        // ==================== 来源图标配置 ====================
        const SOURCE_CONFIG = {
            '东方财富': { emoji: '📈', name: '东方财富' },
            '东方财富快讯': { emoji: '📈', name: '东方财富' },
            '财联社': { emoji: '📡', name: '财联社' },
            '新浪财经': { emoji: '🐦', name: '新浪财经' },
            '华尔街见闻': { emoji: '📰', name: '华尔街见闻' },
            '证券时报': { emoji: '📊', name: '证券时报' },
            '第一财经': { emoji: '📺', name: '第一财经' },
            '默认': { emoji: '🔗', name: '原文' }
        };

        // ==================== 工具函数 ====================

        function getSourceConfig(source) {
            if (!source) return SOURCE_CONFIG['默认'];
            return SOURCE_CONFIG[source] || SOURCE_CONFIG['默认'];
        }

        function getNewsUrl(item) {
            if (item.code) {
                return `https://finance.eastmoney.com/a/${item.code}.html`;
            }
            return 'https://finance.eastmoney.com/';
        }

        function formatNewsTime(timeStr) {
            if (!timeStr) return '未知时间';
            if (/^\d{2}-\d{2} \d{2}:\d{2}$/.test(timeStr)) {
                return timeStr;
            }
            const match = timeStr.match(/(\d{4}-\d{2}-\d{2}) (\d{2}:\d{2})/);
            if (match) {
                return `${match[1].slice(5)} ${match[2]}`;
            }
            return timeStr;
        }

        function getFullNewsTime(item) {
            const fields = ['showTime', 'time', 'publish_time', 'pubDate'];
            for (const field of fields) {
                if (item[field]) return item[field];
                if (item.raw_data?.[field]) return item.raw_data[field];
            }
            return null;
        }

        function renderTags(tags) {
            if (!tags) return '';
            let html = '';
            if (tags.concepts && tags.concepts.length > 0) {
                tags.concepts.forEach(concept => {
                    const matched = concept.matched_keyword ? ` (${concept.matched_keyword})` : '';
                    html += `<span class="tag tag-concept" title="概念: ${concept.name}${matched}">🏷️ ${concept.name}</span>`;
                });
            }
            if (tags.industries && tags.industries.length > 0) {
                tags.industries.forEach(industry => {
                    const levelInfo = `行业: ${industry.level1 || ''} > ${industry.level2 || ''} > ${industry.name}`;
                    html += `<span class="tag tag-industry" title="${levelInfo}">🏭 ${industry.name}</span>`;
                });
            }
            return html;
        }

        // ==================== 合并新闻 ====================
        function mergeNews(newsList) {
            const newsMap = new Map();
            newsList.forEach(item => {
                let rawTitle = item.title || '无标题';
                let cleanTitle = rawTitle
                    .replace(/^(【.*?】)?(财联社.*?日电\s*)?/g, '')
                    .replace(/^\s*|\s*$/g, '');
                if (!cleanTitle) cleanTitle = rawTitle;
                const key = cleanTitle;
                const sourceName = item.source || '默认';
                const url = getNewsUrl(item);
                const time = getFullNewsTime(item) || '未知时间';
                const displayTime = formatNewsTime(time);
                if (!newsMap.has(key)) {
                    newsMap.set(key, {
                        title: rawTitle,
                        cleanTitle: cleanTitle,
                        time: time,
                        displayTime: displayTime,
                        full_content: item.full_content || item.content || '',
                        tags: item.tags || { industries: [], concepts: [] },
                        sources: [{
                            name: sourceName,
                            url: url,
                            config: getSourceConfig(sourceName)
                        }]
                    });
                } else {
                    const existing = newsMap.get(key);
                    if (!existing.sources.some(s => s.name === sourceName)) {
                        existing.sources.push({
                            name: sourceName,
                            url: url,
                            config: getSourceConfig(sourceName)
                        });
                    }
                    if (time !== '未知时间' && (existing.time === '未知时间' || time > existing.time)) {
                        existing.time = time;
                        existing.displayTime = displayTime;
                        if (item.full_content) {
                            existing.full_content = item.full_content;
                        }
                    }
                }
            });
            return Array.from(newsMap.values());
        }

        function sortByTime(newsArray) {
            return newsArray.sort((a, b) => {
                if (a.time === '未知时间' && b.time === '未知时间') return 0;
                if (a.time === '未知时间') return 1;
                if (b.time === '未知时间') return -1;
                return b.time.localeCompare(a.time);
            });
        }

        function filterNews(newsArray, searchTerm) {
            if (!searchTerm) return newsArray;
            const term = searchTerm.toLowerCase();
            return newsArray.filter(item => item.title.toLowerCase().includes(term));
        }

        // ==================== 时间范围过滤 ====================
        function filterByTimeRange(newsArray, range) {
            const now = new Date();
            let cutoffTime = new Date();
            switch(range) {
                case '12h':
                    cutoffTime = new Date(now - 12 * 60 * 60 * 1000);
                    break;
                case '24h':
                    cutoffTime = new Date(now - 24 * 60 * 60 * 1000);
                    break;
                case '7d':
                    cutoffTime = new Date(now - 7 * 24 * 60 * 60 * 1000);
                    break;
                default:
                    return newsArray;
            }
            return newsArray.filter(item => {
                if (item.time === '未知时间') return false;
                const itemDate = new Date(item.time);
                return itemDate >= cutoffTime;
            });
        }

        // ==================== 加载单日数据 ====================
        async function loadDateData(dateStr) {
            if (loadedDates.has(dateStr)) return null;
            try {
                const response = await fetch(`/data/archive/${dateStr}.json?t=${Date.now()}`);
                if (!response.ok) return null;
                const data = await response.json();
                loadedDates.add(dateStr);
                return data;
            } catch (e) {
                console.error(`加载 ${dateStr} 失败:`, e);
                return null;
            }
        }

// ==================== 核心：加载今日数据并自动补全最近12小时 ====================
async function loadToday() {
    try {
        const timestamp = Date.now();
        const [newsRes, timeRes] = await Promise.all([
            fetch('/data/today.json?t=' + timestamp),
            fetch('/data/last_update.txt?t=' + timestamp)
        ]);

        if (!newsRes.ok) throw new Error(`今日数据加载失败 (HTTP ${newsRes.status})`);
        if (!timeRes.ok) throw new Error(`时间戳加载失败 (HTTP ${timeRes.status})`);

        const news = await newsRes.json();
        const updateTime = await timeRes.text();

        // 标记今天已加载
        const today = new Date().toISOString().split('T')[0];
        loadedDates.add(today);

        // 合并今日数据
        allNews = sortByTime(mergeNews(news));

        // 更新时间戳
        const timeStr = updateTime.trim().slice(5, 16) || updateTime.trim();
        document.getElementById('update-time').textContent = timeStr);

        // ===== 修复：加载所有涉及日期的数据 =====
        const now = new Date();
        const startTime = new Date(now);
        startTime.setHours(startTime.getHours() - 12);

        const datesToLoad = [];
        let currentDate = new Date(startTime);

        // 收集所有需要加载的日期
        while (currentDate <= now) {
            const dateStr = currentDate.toISOString().split('T')[0];
            if (!loadedDates.has(dateStr) && dateStr !== today) {
                datesToLoad.push(dateStr);
            }
            currentDate.setDate(currentDate.getDate() + 1);
        }

        // 并行加载所有日期的数据（提升性能）
        if (datesToLoad.length > 0) {
            console.log(`🔄 需要加载历史数据: ${datesToLoad.join(', ')}`);

            const loadPromises = datesToLoad.map(dateStr => loadDateData(dateStr));
            const results = await Promise.all(loadPromises);

            results.forEach((data, index) => {
                if (data && data.length > 0) {
                    const dateStr = datesToLoad[index];
                    console.log(`  ✅ 加载 ${dateStr} 成功: ${data.length} 条`);
                    const merged = mergeNews(data);
                    allNews = sortByTime([...allNews, ...merged]);
                }
            });
        }
        // ===== 修复结束 =====

        // 应用默认12小时过滤
        applyFilters();

        console.log(`✅ 数据加载成功: 总计 ${allNews.length} 条新闻`);

    } catch (error) {
        console.error('❌ 加载今日数据失败:', error);
        document.getElementById('news-list').innerHTML = `
            <div class="error">
                <span>⚠️</span>
                <h3>加载失败</h3>
                <p>${error.message}</p>
                <button onclick="location.reload()" class="retry-btn">重试</button>
            </div>
        `;
    }
}

        // ==================== 按需加载历史数据（用于24h/7d）====================
        async function loadHistoricalData(range) {
            if (isLoading) return;
            isLoading = true;

            const loadBtn = document.getElementById('load-more-btn');
            loadBtn.style.display = 'block';
            loadBtn.textContent = '📅 加载历史数据...';
            loadBtn.classList.add('disabled');

            try {
                const today = new Date();
                const datesToLoad = [];

                if (range === '24h') {
                    // 需要昨天和前天（今天已加载）
                    for (let i = 1; i <= 2; i++) {
                        const date = new Date(today);
                        date.setDate(date.getDate() - i);
                        datesToLoad.push(date.toISOString().split('T')[0]);
                    }
                } else if (range === '7d') {
                    // 需要过去6天（今天已加载）
                    for (let i = 1; i <= 6; i++) {
                        const date = new Date(today);
                        date.setDate(date.getDate() - i);
                        datesToLoad.push(date.toISOString().split('T')[0]);
                    }
                }

                // 去重加载
                for (const dateStr of datesToLoad) {
                    if (!loadedDates.has(dateStr)) {
                        const data = await loadDateData(dateStr);
                        if (data && data.length > 0) {
                            const merged = mergeNews(data);
                            allNews = sortByTime([...allNews, ...merged]);
                        }
                    }
                }

                applyFilters();

            } catch (error) {
                console.error('加载历史数据失败:', error);
            } finally {
                loadBtn.style.display = 'none';
                isLoading = false;
            }
        }

        // ==================== 渲染新闻列表 ====================
        function renderNews(newsArray) {
            const container = document.getElementById('news-list');
            if (!newsArray || newsArray.length === 0) {
                container.innerHTML = '<div class="empty"><span>📭</span><h3>暂无新闻</h3></div>';
                document.getElementById('news-count').textContent = '0';
                return;
            }

            let html = '';
            newsArray.forEach((item, index) => {
                let sourcesHtml = '';
                item.sources.forEach(source => {
                    sourcesHtml += `
                        <a href="${escapeHtml(source.url)}" target="_blank" class="source-icon" title="查看${source.name}原文">
                            <span class="emoji">${source.config.emoji}</span> ${source.config.name}
                        </a>
                    `;
                });

                const tagsHtml = renderTags(item.tags);
                const hasFullContent = item.full_content && item.full_content !== item.title && item.full_content.length > 30;
                const detailId = `detail-${index}-${Date.now()}`;

                html += `
                    <div class="news-card" id="card-${detailId}">
                        <div class="news-title">${escapeHtml(item.title)}</div>
                        <div class="sources-bar">${sourcesHtml}</div>
                        ${hasFullContent ? `
                            <div class="news-detail" id="${detailId}" style="display: none;">
                                ${escapeHtml(item.full_content)}
                            </div>
                            <button class="toggle-detail-btn" data-target="${detailId}">
                                <span>🔽</span> 查看详情
                            </button>
                        ` : ''}
                        <div class="news-time">
                            <span class="time-icon">🕐</span>
                            <span>${item.displayTime || item.time.slice(5, 16)}</span>
                        </div>
                        ${tagsHtml ? `<div class="news-tags">${tagsHtml}</div>` : ''}
                    </div>
                `;
            });

            container.innerHTML = html;
            document.getElementById('news-count').textContent = newsArray.length;

            // 绑定详情按钮
            document.querySelectorAll('.toggle-detail-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const targetId = this.getAttribute('data-target');
                    const detailDiv = document.getElementById(targetId);
                    if (detailDiv) {
                        if (detailDiv.style.display === 'none') {
                            detailDiv.style.display = 'block';
                            this.innerHTML = '<span>🔼</span> 收起详情';
                        } else {
                            detailDiv.style.display = 'none';
                            this.innerHTML = '<span>🔽</span> 查看详情';
                        }
                    }
                });
            });
        }

        function applyFilters() {
            let filtered = filterByTimeRange(allNews, currentTimeRange);
            filtered = filterNews(filtered, currentSearchTerm);
            renderNews(filtered);
        }

        // ==================== 改变时间范围 ====================
        async function setTimeRange(range) {
            currentTimeRange = range;

            document.querySelectorAll('.time-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.range === range) {
                    btn.classList.add('active');
                }
            });

            if (range === '12h') {
                applyFilters();
                return;
            }

            await loadHistoricalData(range);
        }

        function handleSearch() {
            const searchInput = document.getElementById('search-input');
            const term = searchInput.value.trim();
            currentSearchTerm = term;
            document.getElementById('clear-search').style.display = term ? 'inline' : 'none';
            applyFilters();
        }

        function clearSearch() {
            document.getElementById('search-input').value = '';
            currentSearchTerm = '';
            document.getElementById('clear-search').style.display = 'none';
            applyFilters();
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return String(unsafe)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            loadToday();

            document.querySelectorAll('.time-btn').forEach(btn => {
                btn.addEventListener('click', () => setTimeRange(btn.dataset.range));
            });

            document.getElementById('search-btn').addEventListener('click', handleSearch);
            document.getElementById('clear-search').addEventListener('click', clearSearch);
            document.getElementById('search-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleSearch();
            });

            setInterval(() => {
                if (!currentSearchTerm && currentTimeRange === '12h') {
                    loadToday();
                }
            }, 60000);
        });
    </script>
</body>
</html>
