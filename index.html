<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <meta name="theme-color" content="#0b2b4f">
    <title>📊 财经新闻 · 云端快讯</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span>📊</span> 财经新闻·云端快讯
            </h1>
            <div class="stats">
                <span>⏱ 最后更新: <span id="update-time">--:--</span></span>
                <span>📰 当前显示: <span id="news-count">0</span> 条</span>
            </div>
        </div>

        <!-- 时间范围选择器 - 12h/24h/3d -->
        <div class="time-range">
            <button class="time-btn active" data-range="12h">最近12小时</button>
            <button class="time-btn" data-range="24h">最近24小时</button>
            <button class="time-btn" data-range="3d">最近3天</button>
        </div>

        <!-- 搜索栏 -->
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="搜索新闻标题..." value="">
            <button id="search-btn">搜索</button>
            <span class="search-clear" id="clear-search" style="display: none;">✕</span>
            <label class="search-all-label">
                <input type="checkbox" id="search-all">
                <span>🔍 搜索全部历史</span>
            </label>
        </div>

        <div id="news-list" class="news-list">
            <div class="loading">
                <span>📡</span>
                正在加载新闻...
            </div>
        </div>

        <!-- 加载历史数据的提示（动态显示） -->
        <div id="load-more-btn" class="load-more" style="display: none;">
            📅 正在加载历史数据...
        </div>

        <div class="footer">
            <span class="update-badge">⚡ 每30分钟自动更新</span>
            <p style="margin-top: 20px;">
                📌 点击来源图标查看原文 · 支持历史检索 · 行业概念标签<br>
                🚀 基于 GitHub Actions + Cloudflare Pages
            </p>
        </div>
    </div>

    <!-- 按顺序加载JS文件 -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/news-core.js"></script>
    <script src="js/data-loader.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
