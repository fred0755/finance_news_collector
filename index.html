<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <meta name="theme-color" content="#0b2b4f">
    <title>📊 财经新闻 · 云端快讯</title>
    <style>
        /* ... (样式部分保持不变，可完全复制你之前使用的版本) ... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f4f8;
            color: #1e293b;
            line-height: 1.5;
            padding: 16px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(145deg, #0b2b4f, #163a5e);
            color: white;
            padding: 28px 24px;
            border-radius: 28px;
            margin-bottom: 24px;
            box-shadow: 0 12px 24px rgba(0,20,40,0.15);
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 span {
            font-size: 2.2rem;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.12);
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 0.95rem;
        }

        .time-range {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .time-btn {
            background: white;
            border: 1px solid #d0dae8;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #2a4d6e;
        }

        .time-btn:hover {
            background: #e3ecf5;
        }

        .time-btn.active {
            background: #2a6f97;
            color: white;
            border-color: #2a6f97;
        }

        .search-bar {
            background: white;
            border-radius: 50px;
            padding: 8px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 0.95rem;
            padding: 8px 0;
            background: transparent;
        }

        .search-bar button {
            background: #2a6f97;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-bar button:hover {
            background: #1e4a6b;
        }

        .search-clear {
            margin-left: 8px;
            color: #6b7a8f;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .news-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .news-card {
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            border-left: 4px solid #2a6f97;
            transition: all 0.2s ease;
        }

        .news-card:hover {
            box-shadow: 0 8px 18px rgba(0,40,80,0.08);
            transform: translateY(-2px);
        }

        .news-title {
            font-size: 1rem;
            font-weight: 500;
            color: #0a1c2c;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .sources-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }

        .source-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 12px;
            border-radius: 30px;
            background: #f0f4fa;
            color: #2a6f97;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .source-icon:hover {
            background: #2a6f97;
            color: white;
            border-color: #2a6f97;
            transform: scale(1.02);
        }

        .source-icon .emoji {
            margin-right: 4px;
            font-size: 1rem;
        }

        .news-time {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #6b7a8f;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #e9ecf2;
        }

        .news-time .time-icon {
            font-size: 0.9rem;
        }

        .news-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px dashed #e0e7ef;
        }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 400;
            background: #f2f6fc;
            color: #2a4d6e;
            border: 1px solid #d9e2ef;
        }

        .tag-concept {
            background: #e3f0ff;
            border-color: #b8d3f0;
            color: #1a5a9c;
        }

        .tag-industry {
            background: #ecf7ef;
            border-color: #b8e0c9;
            color: #1e6f3c;
        }

        .news-detail {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #2e405b;
            background: #f8fafd;
            border-radius: 12px;
            padding: 12px;
            margin-top: 12px;
            border-left: 3px solid #2a6f97;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .toggle-detail-btn {
            background: white;
            border: 1px solid #d0dae8;
            border-radius: 20px;
            padding: 6px 14px;
            margin-top: 8px;
            color: #2a6f97;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }

        .toggle-detail-btn:hover {
            background: #e3ecf5;
            border-color: #2a6f97;
        }

        .load-more {
            background: white;
            border: 1px solid #d0dae8;
            border-radius: 40px;
            padding: 14px;
            margin: 20px 0;
            text-align: center;
            color: #2a6f97;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .load-more:hover {
            background: #2a6f97;
            color: white;
            border-color: #2a6f97;
        }

        .load-more.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .loading, .error, .empty {
            background: white;
            border-radius: 24px;
            padding: 48px 24px;
            text-align: center;
            color: #5a6e7e;
            box-shadow: 0 6px 14px rgba(0,0,0,0.02);
        }

        .loading span {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 16px;
        }

        .error span {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 16px;
        }

        .retry-btn {
            background: #1e4a6b;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            margin-top: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .retry-btn:hover {
            background: #0f3a52;
        }

        .footer {
            text-align: center;
            margin-top: 48px;
            color: #62748c;
            font-size: 0.78rem;
            border-top: 1px solid #dce5ec;
            padding-top: 28px;
        }

        .update-badge {
            background: #1e4a6b;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            display: inline-block;
            margin-bottom: 16px;
        }

        @media (max-width: 480px) {
            .news-card {
                padding: 14px 16px;
            }
            .news-title {
                font-size: 0.95rem;
            }
            .source-icon {
                padding: 4px 10px;
                font-size: 0.8rem;
            }
            .news-time {
                font-size: 0.75rem;
            }
            .tag {
                padding: 2px 8px;
                font-size: 0.7rem;
            }
            .time-btn {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            .news-detail {
                font-size: 0.85rem;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span>📊</span> 财经新闻·云端快讯
            </h1>
            <div class="stats">
                <span>⏱ 最后更新: <span id="update-time">--:--</span></span>
                <span>📰 当前显示: <span id="news-count">0</span> 条</span>
            </div>
        </div>

        <div class="time-range">
            <button class="time-btn active" data-range="12h">最近12小时</button>
            <button class="time-btn" data-range="24h">最近24小时</button>
            <button class="time-btn" data-range="7d">最近7天</button>
        </div>

        <div class="search-bar">
            <input type="text" id="search-input" placeholder="搜索新闻标题..." value="">
            <button id="search-btn">搜索</button>
            <span class="search-clear" id="clear-search" style="display: none;">✕</span>
        </div>

        <div id="news-list" class="news-list">
            <div class="loading">
                <span>📡</span>
                正在加载新闻...
            </div>
        </div>

        <div id="load-more-btn" class="load-more" style="display: none;">
            📅 正在加载历史数据...
        </div>

        <div class="footer">
            <span class="update-badge">⚡ 每30分钟自动更新</span>
            <p style="margin-top: 20px;">
                📌 点击来源图标查看原文 · 支持历史检索<br>
                🚀 基于 GitHub Actions + Cloudflare Pages
            </p>
        </div>
    </div>

    <script>
        // --- 全局变量 ---
        let allNews = [];
        let displayedNews = [];
        let currentTimeRange = '12h';
        let currentSearchTerm = '';
        let loadedDates = new Set();
        let isLoading = false;

        // --- 配置 ---
        const SOURCE_CONFIG = {
            '东方财富': { emoji: '📈', name: '东方财富' },
            '东方财富快讯': { emoji: '📈', name: '东方财富' },
            '财联社': { emoji: '📡', name: '财联社' },
            '默认': { emoji: '🔗', name: '原文' }
        };

        // --- 工具函数 ---
        function getSourceConfig(source) {
            return SOURCE_CONFIG[source] || SOURCE_CONFIG['默认'];
        }

        function getNewsUrl(item) {
            return item.code ? `https://finance.eastmoney.com/a/${item.code}.html` : 'https://finance.eastmoney.com/';
        }

        function formatNewsTime(timeStr) {
            if (!timeStr) return '未知时间';
            const match = timeStr.match(/(\d{4}-\d{2}-\d{2}) (\d{2}:\d{2})/);
            return match ? `${match[1].slice(5)} ${match[2]}` : timeStr;
        }

        function getFullNewsTime(item) {
            return item.showTime || item.time || item.publish_time || null;
        }

        function renderTags(tags) {
            if (!tags) return '';
            let html = '';
            (tags.concepts || []).forEach(c => html += `<span class="tag tag-concept">🏷️ ${c.name}</span>`);
            (tags.industries || []).forEach(i => html += `<span class="tag tag-industry">🏭 ${i.name}</span>`);
            return html;
        }

        // --- 核心：合并新闻 ---
        function mergeNews(newsList) {
            const map = new Map();
            newsList.forEach(item => {
                if (!item || !item.title) return;
                const key = item.title.replace(/^【.*?】|(财联社.*?日电\s*)/g, '').trim();
                const sourceName = item.source || '默认';
                const url = getNewsUrl(item);
                const time = getFullNewsTime(item) || '未知时间';

                if (!map.has(key)) {
                    map.set(key, {
                        title: item.title,
                        time: time,
                        displayTime: formatNewsTime(time),
                        full_content: item.full_content || item.content || '',
                        tags: item.tags || {},
                        sources: [{ name: sourceName, url: url, config: getSourceConfig(sourceName) }]
                    });
                } else {
                    const existing = map.get(key);
                    if (!existing.sources.some(s => s.name === sourceName)) {
                        existing.sources.push({ name: sourceName, url: url, config: getSourceConfig(sourceName) });
                    }
                }
            });
            return Array.from(map.values()).sort((a, b) => (b.time || '').localeCompare(a.time || ''));
        }

        // --- 过滤 ---
        function filterByTimeRange(news, range) {
            const now = new Date();
            const cutoff = new Date(now - ({ '12h': 12, '24h': 24, '7d': 168 }[range] || 12) * 60 * 60 * 1000);
            return news.filter(item => item.time && new Date(item.time) >= cutoff);
        }

        function filterBySearch(news, term) {
            return term ? news.filter(item => item.title.toLowerCase().includes(term.toLowerCase())) : news;
        }

        // --- 加载单日数据 ---
        async function loadDateData(dateStr) {
            if (loadedDates.has(dateStr)) return null;
            try {
                const resp = await fetch(`/data/archive/${dateStr}.json?t=${Date.now()}`);
                if (!resp.ok) return null;
                const data = await resp.json();
                loadedDates.add(dateStr);
                return data;
            } catch (e) {
                console.error(`加载 ${dateStr} 失败`, e);
                return null;
            }
        }

        // --- 渲染 ---
        function renderNews(news) {
            const container = document.getElementById('news-list');
            if (!news || !news.length) {
                container.innerHTML = '<div class="empty"><span>📭</span><h3>暂无新闻</h3></div>';
                document.getElementById('news-count').textContent = '0';
                return;
            }

            let html = '';
            news.forEach((item, i) => {
                const sources = item.sources.map(s =>
                    `<a href="${s.url}" target="_blank" class="source-icon">${s.config.emoji} ${s.config.name}</a>`
                ).join('');
                const tags = renderTags(item.tags);
                const hasDetail = item.full_content && item.full_content.length > 30 && item.full_content !== item.title;
                const detailId = `d-${i}`;

                html += `
                <div class="news-card">
                    <div class="news-title">${item.title}</div>
                    <div class="sources-bar">${sources}</div>
                    ${hasDetail ? `
                        <div id="${detailId}" class="news-detail" style="display:none">${item.full_content}</div>
                        <button class="toggle-detail-btn" data-target="${detailId}"><span>🔽</span> 查看详情</button>
                    ` : ''}
                    <div class="news-time">🕐 ${item.displayTime}</div>
                    ${tags ? `<div class="news-tags">${tags}</div>` : ''}
                </div>`;
            });

            container.innerHTML = html;
            document.getElementById('news-count').textContent = news.length;

            document.querySelectorAll('.toggle-detail-btn').forEach(btn => {
                btn.onclick = () => {
                    const detail = document.getElementById(btn.dataset.target);
                    if (detail) {
                        detail.style.display = detail.style.display === 'none' ? 'block' : 'none';
                        btn.innerHTML = detail.style.display === 'none' ? '<span>🔽</span> 查看详情' : '<span>🔼</span> 收起详情';
                    }
                };
            });
        }

        // --- 更新视图 ---
        function updateView() {
            let filtered = filterByTimeRange(allNews, currentTimeRange);
            filtered = filterBySearch(filtered, currentSearchTerm);
            renderNews(filtered);
        }

        // --- 初始化加载 ---
        async function loadInitialData() {
            try {
                // 1. 加载今日数据
                const [newsRes, timeRes] = await Promise.all([
                    fetch('/data/today.json?t=' + Date.now()),
                    fetch('/data/last_update.txt?t=' + Date.now())
                ]);

                if (!newsRes.ok) throw new Error('无法加载今日数据');

                const news = await newsRes.json();
                const updateTime = await timeRes.text();

                const today = new Date().toISOString().split('T')[0];
                loadedDates.add(today);
                allNews = mergeNews(news);
                document.getElementById('update-time').textContent = (updateTime || '').slice(5, 16) || '--:--';

                // 2. 计算需要的历史日期
                const now = new Date();
                const start = new Date(now - 12 * 60 * 60 * 1000);
                const dates = [];
                let d = new Date(start);
                while (d <= now) {
                    const ds = d.toISOString().split('T')[0];
                    if (!loadedDates.has(ds)) dates.push(ds);
                    d.setDate(d.getDate() + 1);
                }

                // 3. 加载历史数据
                if (dates.length) {
                    document.getElementById('load-more-btn').style.display = 'block';
                    const results = await Promise.all(dates.map(d => loadDateData(d)));
                    results.forEach((data, i) => {
                        if (data?.length) {
                            allNews = mergeNews([...allNews, ...data]);
                        }
                    });
                    document.getElementById('load-more-btn').style.display = 'none';
                }

                // 4. 显示
                updateView();

            } catch (e) {
                console.error('初始化失败', e);
                document.getElementById('news-list').innerHTML = `
                    <div class="error"><span>⚠️</span><h3>加载失败</h3><p>${e.message}</p></div>
                `;
            }
        }

        // --- 切换时间范围 ---
        async function setTimeRange(range) {
            currentTimeRange = range;
            document.querySelectorAll('.time-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.range === range);
            });

            if (range === '12h') {
                updateView();
                return;
            }

            if (isLoading) return;
            isLoading = true;

            const loadBtn = document.getElementById('load-more-btn');
            loadBtn.style.display = 'block';
            loadBtn.textContent = '📅 正在加载历史数据...';

            try {
                const now = new Date();
                const hours = range === '24h' ? 24 : 168;
                const start = new Date(now - hours * 60 * 60 * 1000);
                const dates = [];
                let d = new Date(start);
                while (d <= now) {
                    const ds = d.toISOString().split('T')[0];
                    if (!loadedDates.has(ds) && ds !== new Date().toISOString().split('T')[0]) {
                        dates.push(ds);
                    }
                    d.setDate(d.getDate() + 1);
                }

                if (dates.length) {
                    const results = await Promise.all(dates.map(d => loadDateData(d)));
                    results.forEach(data => {
                        if (data?.length) {
                            allNews = mergeNews([...allNews, ...data]);
                        }
                    });
                }

                updateView();

            } finally {
                loadBtn.style.display = 'none';
                isLoading = false;
            }
        }

        // --- 搜索 ---
        function handleSearch() {
            const term = document.getElementById('search-input').value.trim();
            currentSearchTerm = term;
            document.getElementById('clear-search').style.display = term ? 'inline' : 'none';
            updateView();
        }

        function clearSearch() {
            document.getElementById('search-input').value = '';
            currentSearchTerm = '';
            document.getElementById('clear-search').style.display = 'none';
            updateView();
        }

        // --- 启动 ---
        window.addEventListener('DOMContentLoaded', () => {
            loadInitialData();

            document.querySelectorAll('.time-btn').forEach(btn => {
                btn.addEventListener('click', () => setTimeRange(btn.dataset.range));
            });

            document.getElementById('search-btn').addEventListener('click', handleSearch);
            document.getElementById('clear-search').addEventListener('click', clearSearch);
            document.getElementById('search-input').addEventListener('keypress', e => e.key === 'Enter' && handleSearch());

            setInterval(() => {
                if (currentTimeRange === '12h' && !currentSearchTerm) {
                    loadInitialData();
                }
            }, 60000);
        });
    </script>
</body>
</html>
