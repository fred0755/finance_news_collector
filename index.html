<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <meta name="theme-color" content="#0b2b4f">
    <title>📊 财经新闻 · 云端快讯</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f4f8;
            color: #1e293b;
            line-height: 1.5;
            padding: 16px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(145deg, #0b2b4f, #163a5e);
            color: white;
            padding: 28px 24px;
            border-radius: 28px;
            margin-bottom: 24px;
            box-shadow: 0 12px 24px rgba(0,20,40,0.15);
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 span {
            font-size: 2.2rem;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.12);
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 0.95rem;
        }

        .time-range {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .time-btn {
            background: white;
            border: 1px solid #d0dae8;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #2a4d6e;
        }

        .time-btn:hover {
            background: #e3ecf5;
        }

        .time-btn.active {
            background: #2a6f97;
            color: white;
            border-color: #2a6f97;
        }

        .search-bar {
            background: white;
            border-radius: 50px;
            padding: 8px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 0.95rem;
            padding: 8px 0;
            background: transparent;
        }

        .search-bar button {
            background: #2a6f97;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-bar button:hover {
            background: #1e4a6b;
        }

        .search-clear {
            margin-left: 8px;
            color: #6b7a8f;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .news-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .news-card {
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            border-left: 4px solid #2a6f97;
            transition: all 0.2s ease;
        }

        .news-card:hover {
            box-shadow: 0 8px 18px rgba(0,40,80,0.08);
            transform: translateY(-2px);
        }

        .news-title {
            font-size: 1rem;
            font-weight: 500;
            color: #0a1c2c;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .sources-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }

        .source-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 12px;
            border-radius: 30px;
            background: #f0f4fa;
            color: #2a6f97;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .source-icon:hover {
            background: #2a6f97;
            color: white;
            border-color: #2a6f97;
            transform: scale(1.02);
        }

        .source-icon .emoji {
            margin-right: 4px;
            font-size: 1rem;
        }

        .news-time {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #6b7a8f;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #e9ecf2;
        }

        .news-time .time-icon {
            font-size: 0.9rem;
        }

        .news-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px dashed #e0e7ef;
        }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 400;
            background: #f2f6fc;
            color: #2a4d6e;
            border: 1px solid #d9e2ef;
        }

        .tag-concept {
            background: #e3f0ff;
            border-color: #b8d3f0;
            color: #1a5a9c;
        }

        .tag-industry {
            background: #ecf7ef;
            border-color: #b8e0c9;
            color: #1e6f3c;
        }

        .news-detail {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #2e405b;
            background: #f8fafd;
            border-radius: 12px;
            padding: 12px;
            margin-top: 12px;
            border-left: 3px solid #2a6f97;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .toggle-detail-btn {
            background: white;
            border: 1px solid #d0dae8;
            border-radius: 20px;
            padding: 6px 14px;
            margin-top: 8px;
            color: #2a6f97;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }

        .toggle-detail-btn:hover {
            background: #e3ecf5;
            border-color: #2a6f97;
        }

        .load-more {
            background: white;
            border: 1px solid #d0dae8;
            border-radius: 40px;
            padding: 14px;
            margin: 20px 0;
            text-align: center;
            color: #2a6f97;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .load-more:hover {
            background: #2a6f97;
            color: white;
            border-color: #2a6f97;
        }

        .load-more.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .loading, .error, .empty {
            background: white;
            border-radius: 24px;
            padding: 48px 24px;
            text-align: center;
            color: #5a6e7e;
            box-shadow: 0 6px 14px rgba(0,0,0,0.02);
        }

        .loading span {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 16px;
        }

        .error span {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 16px;
        }

        .retry-btn {
            background: #1e4a6b;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            margin-top: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .retry-btn:hover {
            background: #0f3a52;
        }

        .footer {
            text-align: center;
            margin-top: 48px;
            color: #62748c;
            font-size: 0.78rem;
            border-top: 1px solid #dce5ec;
            padding-top: 28px;
        }

        .update-badge {
            background: #1e4a6b;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            display: inline-block;
            margin-bottom: 16px;
        }

        @media (max-width: 480px) {
            .news-card {
                padding: 14px 16px;
            }
            .news-title {
                font-size: 0.95rem;
            }
            .source-icon {
                padding: 4px 10px;
                font-size: 0.8rem;
            }
            .news-time {
                font-size: 0.75rem;
            }
            .tag {
                padding: 2px 8px;
                font-size: 0.7rem;
            }
            .time-btn {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            .news-detail {
                font-size: 0.85rem;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span>📊</span> 财经新闻·云端快讯
            </h1>
            <div class="stats">
                <span>⏱ 最后更新: <span id="update-time">--:--</span></span>
                <span>📰 当前显示: <span id="news-count">0</span> 条</span>
            </div>
        </div>

        <!-- 时间范围选择器 - 12h/24h/3d -->
        <div class="time-range">
            <button class="time-btn active" data-range="12h">最近12小时</button>
            <button class="time-btn" data-range="24h">最近24小时</button>
            <button class="time-btn" data-range="3d">最近3天</button>
        </div>

        <!-- 搜索栏 -->
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="搜索新闻标题..." value="">
            <button id="search-btn">搜索</button>
            <span class="search-clear" id="clear-search" style="display: none;">✕</span>
        </div>

        <div id="news-list" class="news-list">
            <div class="loading">
                <span>📡</span>
                正在加载新闻...
            </div>
        </div>

        <!-- 加载历史数据的提示（动态显示） -->
        <div id="load-more-btn" class="load-more" style="display: none;">
            📅 正在加载历史数据...
        </div>

        <div class="footer">
            <span class="update-badge">⚡ 每30分钟自动更新</span>
            <p style="margin-top: 20px;">
                📌 点击来源图标查看原文 · 支持历史检索 · 行业概念标签<br>
                🚀 基于 GitHub Actions + Cloudflare Pages
            </p>
        </div>
    </div>

    <script>
        // ==================== 全局变量 ====================
        let allNews = [];
        let displayedNews = [];
        let currentTimeRange = '12h';
        let currentSearchTerm = '';
        let loadedDates = new Set();
        let isLoading = false;
        let lastUpdateTime = '';

        // ==================== 来源图标配置（包含所有可能值）====================
        const SOURCE_CONFIG = {
            '东方财富': { emoji: '📈', name: '东方财富' },
            '东方财富快讯': { emoji: '📈', name: '东方财富' },
            '东方财富网': { emoji: '📈', name: '东方财富' },
            '财联社': { emoji: '📡', name: '财联社' },
            '新浪财经': { emoji: '🐦', name: '新浪财经' },
            '华尔街见闻': { emoji: '📰', name: '华尔街见闻' },
            '证券时报': { emoji: '📊', name: '证券时报' },
            '第一财经': { emoji: '📺', name: '第一财经' },
            '默认': { emoji: '🔗', name: '原文' }
        };

        // ==================== 获取来源配置 ====================
        // 重要说明：
        // 1. 优先精确匹配，如果找不到则使用默认配置
        // 2. 即使 source 为空，也会返回默认图标，避免页面崩溃
        function getSourceConfig(source) {
            const defaultConfig = SOURCE_CONFIG['默认'];
            if (!source) return defaultConfig;
            return SOURCE_CONFIG[source] || defaultConfig;
        }

        // ==================== 获取新闻链接 ====================
        // 重要说明：
        // 1. 必须使用 item.code 构造链接，格式为 https://finance.eastmoney.com/a/{code}.html
        // 2. 如果 item.code 不存在，才使用默认首页（这种情况极少）
        // 3. 此函数被 mergeNews 和 renderNews 调用，确保链接正确
        function getNewsUrl(item) {
            if (item && item.code) {
                const constructedUrl = `https://finance.eastmoney.com/a/${item.code}.html`;
                // 调试时可取消注释
                // console.log('🔗 为新闻构造链接:', constructedUrl, '新闻标题:', item.title?.substring(0, 30));
                return constructedUrl;
            }
            console.warn('⚠️ 新闻缺少 code 字段，使用默认首页', item);
            return 'https://finance.eastmoney.com/';
        }

        // ==================== 格式化时间显示 ====================
        function formatNewsTime(timeStr) {
            if (!timeStr) return '未知时间';
            if (/^\d{2}-\d{2} \d{2}:\d{2}$/.test(timeStr)) {
                return timeStr;
            }
            const match = timeStr.match(/(\d{4}-\d{2}-\d{2}) (\d{2}:\d{2})/);
            if (match) {
                return `${match[1].slice(5)} ${match[2]}`;
            }
            return timeStr;
        }

        // ==================== 获取新闻时间 ====================
        function getFullNewsTime(item) {
            if (!item) return null;
            return item.showTime || item.time || item.publish_time || item.pubDate || item.raw_data?.showTime || null;
        }

        // ==================== 渲染标签 ====================
        function renderTags(tags) {
            if (!tags) return '';
            let html = '';
            if (tags.concepts && tags.concepts.length > 0) {
                tags.concepts.forEach(concept => {
                    const matched = concept.matched_keyword ? ` (${concept.matched_keyword})` : '';
                    html += `<span class="tag tag-concept" title="概念: ${concept.name}${matched}">🏷️ ${concept.name}</span>`;
                });
            }
            if (tags.industries && tags.industries.length > 0) {
                tags.industries.forEach(industry => {
                    const levelInfo = `行业: ${industry.level1 || ''} > ${industry.level2 || ''} > ${industry.name}`;
                    html += `<span class="tag tag-industry" title="${levelInfo}">🏭 ${industry.name}</span>`;
                });
            }
            return html;
        }

        // ==================== 合并新闻（核心逻辑）====================
        // 重要说明 - 请仔细阅读：
        // 1. 必须保存 code 字段！getNewsUrl 依赖它构造正确链接
        // 2. 数据中没有 source 字段，需要根据标题特征推断来源
        // 3. 东方财富新闻特征：标题包含“快讯/行情/公告/业绩/涨停/跌停”等关键词
        // 4. 东方财富的 code 是纯数字字符串
        // 5. 当同标题新闻再次出现时，需要更新 code 和 sources 中的 url，确保链接最新
        function mergeNews(newsList) {
            const newsMap = new Map();

            newsList.forEach(item => {
                let rawTitle = item.title || '无标题';
                let cleanTitle = rawTitle
                    .replace(/^(【.*?】)?(财联社.*?日电\s*)?/g, '')
                    .replace(/^\s*|\s*$/g, '');
                if (!cleanTitle) cleanTitle = rawTitle;

                const key = cleanTitle;

                // ===== 推断来源（因为数据中没有 source 字段）=====
                let sourceName = '默认';

                // 1. 根据标题特征推断东方财富
                if (item.title.includes('快讯') ||
                    item.title.includes('行情') ||
                    item.title.includes('公告') ||
                    item.title.includes('业绩') ||
                    item.title.includes('涨停') ||
                    item.title.includes('跌停')) {
                    sourceName = '东方财富快讯';
                }

                // 2. 根据 code 特征（东方财富的 code 是纯数字）
                if (item.code && /^\d+$/.test(item.code)) {
                    sourceName = '东方财富快讯';
                }

                // 3. 财联社来源推断
                if (item.title.includes('财联社') || item.title.includes('科创板')) {
                    sourceName = '财联社';
                }

                const url = getNewsUrl(item);
                const time = getFullNewsTime(item) || '未知时间';
                const displayTime = formatNewsTime(time);

                if (!newsMap.has(key)) {
                    // 首次出现，必须保存 code
                    newsMap.set(key, {
                        title: rawTitle,
                        cleanTitle: cleanTitle,
                        code: item.code,           // ← 必须保存！用于后续构造链接
                        time: time,
                        displayTime: displayTime,
                        full_content: item.full_content || item.content || '',
                        tags: item.tags || { industries: [], concepts: [] },
                        sources: [{
                            name: sourceName,
                            url: url,
                            config: getSourceConfig(sourceName)
                        }]
                    });
                } else {
                    const existing = newsMap.get(key);

                    // 查找是否已存在相同来源
                    const existingSource = existing.sources.find(s => s.name === sourceName);
                    if (!existingSource) {
                        // 来源不存在，添加新来源（使用最新的 url）
                        existing.sources.push({
                            name: sourceName,
                            url: url,
                            config: getSourceConfig(sourceName)
                        });
                    } else {
                        // 关键修复：来源已存在，更新其 url 为最新值（避免链接过时）
                        existingSource.url = url;
                    }

                    // 如果新新闻时间更新，则更新整个条目的 code 和其他字段
                    if (time !== '未知时间' && (existing.time === '未知时间' || time > existing.time)) {
                        existing.time = time;
                        existing.displayTime = displayTime;
                        existing.code = item.code;   // ← 更新 code 为最新值
                        if (item.full_content) {
                            existing.full_content = item.full_content;
                        }
                    } else {
                        // 即使时间没更新，也确保 code 是最新的（防止旧 code 导致链接错误）
                        if (!existing.code && item.code) {
                            existing.code = item.code;
                        }
                    }
                }
            });

            // 按时间倒序排列
            return Array.from(newsMap.values()).sort((a, b) => (b.time || '').localeCompare(a.time || ''));
        }

        // ==================== 过滤新闻（根据搜索词）====================
        function filterNews(newsArray, searchTerm) {
            if (!searchTerm) return newsArray;
            const term = searchTerm.toLowerCase();
            return newsArray.filter(item =>
                item.title.toLowerCase().includes(term)
            );
        }

        // ==================== 根据时间范围过滤 ====================
        function filterByTimeRange(newsArray, range) {
            const now = new Date();
            let cutoffTime = new Date();

            switch(range) {
                case '12h':
                    cutoffTime = new Date(now - 12 * 60 * 60 * 1000);
                    break;
                case '24h':
                    cutoffTime = new Date(now - 24 * 60 * 60 * 1000);
                    break;
                case '3d':
                    cutoffTime = new Date(now - 3 * 24 * 60 * 60 * 1000);
                    break;
                default:
                    return newsArray;
            }

            return newsArray.filter(item => {
                if (item.time === '未知时间') return false;
                const itemDate = new Date(item.time);
                return itemDate >= cutoffTime;
            });
        }

        // ==================== 加载单日数据 ====================
        async function loadDateData(dateStr) {
            if (loadedDates.has(dateStr)) return null;
            try {
                const response = await fetch(`/data/archive/${dateStr}.json?t=${Date.now()}`);
                if (!response.ok) return null;
                const data = await response.json();
                loadedDates.add(dateStr);
                return data;
            } catch (e) {
                console.error(`加载 ${dateStr} 失败:`, e);
                return null;
            }
        }

        // ==================== 初始化加载（基于归档文件）====================
        async function loadInitialData() {
            try {
                console.log('🔄 开始加载初始数据...');
                // 1. 更新时间戳
                const timeRes = await fetch('/data/last_update.txt?t=' + Date.now());
                const updateTime = await timeRes.text();
                lastUpdateTime = updateTime;
                document.getElementById('update-time').textContent = updateTime.trim().slice(5, 16) || '--:--';

                // 2. 计算最近12小时需要的日期
                const now = new Date();
                const startTime = new Date(now);
                startTime.setHours(startTime.getHours() - 12);

                const datesToLoad = [];
                let currentDate = new Date(startTime);

                while (currentDate <= now) {
                    const dateStr = currentDate.toISOString().split('T')[0];
                    if (!loadedDates.has(dateStr)) {
                        datesToLoad.push(dateStr);
                    }
                    currentDate.setDate(currentDate.getDate() + 1);
                }

                // 3. 加载所有需要的归档文件
                if (datesToLoad.length > 0) {
                    console.log(`🔄 加载初始数据: ${datesToLoad.join(', ')}`);

                    const loadPromises = datesToLoad.map(dateStr => loadDateData(dateStr));
                    const results = await Promise.all(loadPromises);

                    allNews = [];
                    results.forEach((data, index) => {
                        if (data && data.length > 0) {
                            const dateStr = datesToLoad[index];
                            console.log(`  ✅ 加载 ${dateStr} 成功: ${data.length} 条`);
                            const merged = mergeNews(data);
                            allNews = mergeNews([...allNews, ...merged]);
                        }
                    });
                }

                // 4. 强制加载今天的数据（防止日期计算遗漏）
                const todayStr = now.toISOString().split('T')[0];
                if (!loadedDates.has(todayStr)) {
                    const todayData = await loadDateData(todayStr);
                    if (todayData && todayData.length > 0) {
                        const merged = mergeNews(todayData);
                        allNews = mergeNews([...allNews, ...merged]);
                    }
                }

                // 5. 显示12小时视图
                applyFilters();
                console.log(`✅ 初始化完成: 总计 ${allNews.length} 条新闻，最新时间: ${allNews[0]?.time}`);

            } catch (e) {
                console.error('❌ 加载初始数据失败:', e);
                document.getElementById('news-list').innerHTML = `
                    <div class="error">
                        <span>⚠️</span>
                        <h3>加载失败</h3>
                        <p>${e.message}</p>
                        <button onclick="location.reload()" class="retry-btn">重试</button>
                    </div>
                `;
            }
        }

        // ==================== 按需加载历史数据（用于24h/3d）====================
        async function loadHistoricalData(range) {
            if (isLoading) return;
            isLoading = true;

            const loadBtn = document.getElementById('load-more-btn');
            loadBtn.style.display = 'block';
            loadBtn.textContent = '📅 正在加载历史数据...';
            loadBtn.classList.add('disabled');

            try {
                const now = new Date();
                const days = range === '24h' ? 1 : 2;
                const datesToLoad = [];

                for (let i = 1; i <= days; i++) {
                    const date = new Date(now);
                    date.setDate(date.getDate() - i);
                    const dateStr = date.toISOString().split('T')[0];
                    if (!loadedDates.has(dateStr)) {
                        datesToLoad.push(dateStr);
                    }
                }

                if (datesToLoad.length > 0) {
                    const loadPromises = datesToLoad.map(dateStr => loadDateData(dateStr));
                    const results = await Promise.all(loadPromises);

                    results.forEach((data) => {
                        if (data && data.length > 0) {
                            const merged = mergeNews(data);
                            allNews = mergeNews([...allNews, ...merged]);
                        }
                    });
                }

                applyFilters();

            } catch (error) {
                console.error('加载历史数据失败:', error);
            } finally {
                loadBtn.style.display = 'none';
                isLoading = false;
            }
        }

        // ==================== 渲染新闻列表 ====================
        function renderNews(newsArray) {
            const container = document.getElementById('news-list');
            if (!newsArray || newsArray.length === 0) {
                container.innerHTML = '<div class="empty"><span>📭</span><h3>暂无新闻</h3></div>';
                document.getElementById('news-count').textContent = '0';
                return;
            }

            let html = '';
            newsArray.forEach((item, index) => {
                const displayTime = item.displayTime || (item.time ? item.time.slice(5, 16) : '未知时间');

                // 渲染来源图标
                let sourcesHtml = '';
                if (item.sources && item.sources.length > 0) {
                    item.sources.forEach(source => {
                        sourcesHtml += `
                            <a href="${escapeHtml(source.url)}" target="_blank" class="source-icon" title="查看${source.name}原文">
                                <span class="emoji">${source.config.emoji}</span> ${source.config.name}
                            </a>
                        `;
                    });
                }

                const tagsHtml = renderTags(item.tags);
                const hasFullContent = item.full_content &&
                                      item.full_content !== item.title &&
                                      item.full_content.length > 30;
                const detailId = `detail-${index}-${Date.now()}`;

                html += `
                    <div class="news-card" id="card-${detailId}">
                        <div class="news-title">${escapeHtml(item.title)}</div>
                        <div class="sources-bar">${sourcesHtml}</div>
                        ${hasFullContent ? `
                            <div class="news-detail" id="${detailId}" style="display: none;">
                                ${escapeHtml(item.full_content)}
                            </div>
                            <button class="toggle-detail-btn" data-target="${detailId}">
                                <span>🔽</span> 查看详情
                            </button>
                        ` : ''}
                        <div class="news-time">
                            <span class="time-icon">🕐</span>
                            <span>${displayTime}</span>
                        </div>
                        ${tagsHtml ? `<div class="news-tags">${tagsHtml}</div>` : ''}
                    </div>
                `;
            });

            container.innerHTML = html;
            document.getElementById('news-count').textContent = newsArray.length;

            document.querySelectorAll('.toggle-detail-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const targetId = this.getAttribute('data-target');
                    const detailDiv = document.getElementById(targetId);
                    if (detailDiv) {
                        if (detailDiv.style.display === 'none') {
                            detailDiv.style.display = 'block';
                            this.innerHTML = '<span>🔼</span> 收起详情';
                        } else {
                            detailDiv.style.display = 'none';
                            this.innerHTML = '<span>🔽</span> 查看详情';
                        }
                    }
                });
            });
        }

        // 应用所有过滤条件
        function applyFilters() {
            let filtered = filterByTimeRange(allNews, currentTimeRange);
            filtered = filterNews(filtered, currentSearchTerm);
            renderNews(filtered);
        }

        // 改变时间范围
        async function setTimeRange(range) {
            currentTimeRange = range;

            document.querySelectorAll('.time-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.range === range) {
                    btn.classList.add('active');
                }
            });

            if (range === '12h') {
                applyFilters();
                return;
            }

            await loadHistoricalData(range);
        }

        // 搜索处理
        function handleSearch() {
            const searchInput = document.getElementById('search-input');
            const term = searchInput.value.trim();
            currentSearchTerm = term;
            document.getElementById('clear-search').style.display = term ? 'inline' : 'none';
            applyFilters();
        }

        function clearSearch() {
            document.getElementById('search-input').value = '';
            currentSearchTerm = '';
            document.getElementById('clear-search').style.display = 'none';
            applyFilters();
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return String(unsafe)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // ==================== 初始化 ====================
        window.addEventListener('DOMContentLoaded', () => {
            loadInitialData();

            document.querySelectorAll('.time-btn').forEach(btn => {
                btn.addEventListener('click', () => setTimeRange(btn.dataset.range));
            });

            document.getElementById('search-btn').addEventListener('click', handleSearch);
            document.getElementById('clear-search').addEventListener('click', clearSearch);
            document.getElementById('search-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleSearch();
            });

            // 注意：移除了自动刷新定时器，完全手动刷新
        });
    </script>
</body>
</html>
