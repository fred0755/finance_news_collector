name: 财经新闻云端采集

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 设置Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 运行采集脚本
        run: |
          echo "========================================="
          echo "🚀 开始采集"
          echo "========================================="
          
          cd src/collectors
          python run_github_action.py
          
          cd ../..
          
          echo ""
          echo "========================================="
          echo "📊 检查数据文件"
          echo "========================================="
          ls -la data/
          echo ""

      - name: 提交并推送数据到 GitHub
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # 强制添加 data 目录
          git add -f data/
          
          # 如果有变更则提交
          git diff --cached --quiet || git commit -m "chore: 自动更新财经新闻数据 $(date +'%Y-%m-%d %H:%M:%S')"
          
          # 推送到 GitHub
          git push origin main
          echo "✅ 已推送到 GitHub"