name: 财经新闻云端采集

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

# 🚨 关键修复：赋予写入权限
permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 设置Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 运行采集脚本
        run: |
          echo "========================================="
          echo "🚀 开始采集"
          echo "========================================="
          
          cd src/collectors
          python run_github_action.py
          
          cd ../..
          
          echo ""
          echo "========================================="
          echo "📊 检查数据文件"
          echo "========================================="
          ls -la data/
          echo ""

      - name: 提交并推送数据到 GitHub
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # 强制添加 data 目录
          git add -f data/
          
          # 如果有变更则提交
          git diff --cached --quiet || git commit -m "chore: 自动更新财经新闻数据 $(date +'%Y-%m-%d %H:%M:%S')"
          
          # 推送到 GitHub
          git push origin main
          echo "✅ 已推送到 GitHub"

      - name: 同步到 Gitee（镜像备份）
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if [ -n "$GITEE_USERNAME" ] && [ -n "$GITEE_TOKEN" ]; then
            echo "推送到 Gitee..."
            git push https://$GITEE_USERNAME:$GITEE_TOKEN@gitee.com/$GITEE_USERNAME/finance_news_collector.git main --force
            echo "✅ Gitee 同步完成"
          else
            echo "⚠️ Gitee 凭证未配置"
          fi

      - name: 钉钉通知
        if: always()
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          if [ -z "$DINGTALK_WEBHOOK" ]; then
            exit 0
          fi
          STATUS="${{ job.status }}"
          TIME=$(date '+%Y-%m-%d %H:%M:%S')
          if [ "$STATUS" = "success" ]; then
            MSG="✅ 采集成功"
          else
            MSG="❌ 采集失败"
          fi
          curl -s -X POST "$DINGTALK_WEBHOOK" -H "Content-Type: application/json" -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"$MSG $TIME\"}}"